[directories]
; relative or absolute directories
; output directories shall exist, otherwise it will use the dfault ones

; where the inpute video shall be stored
inputs="inputs"

; cache is the directory where all generate images are stored during the processing.
;
cache="N:\cache"
cache_progressive="D:\mco\cache\progressive"

audio="D:\mco\cache\audio"

; frames directory is a directory to save frames extracted for study purpose
; 2023-07-29: unused
frames="frames"

; hashes directory contains a log of all hashes for each filter. Usefull for study.
hashes="hashes"

; outputs directory contains the output files
outputs="outputs"

; MKV Tool Nix installation path (default)
mkvmerge_win="C:\Program Files\MKVToolNix"

; default directories, do not modify this
cache_default="cache"
audio_default="cache/audio"
frames_default="frames"
cache_progressive_default="cache/progressive"
