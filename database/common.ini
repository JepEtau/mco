[settings]
video_fps=25
video_pixel_format="yuv420p"
video_color_space="bt709"
video_color_range="tv"
video_quality="-c:v libx264 -preset medium -crf 17"
video_tune="-tune animation"
video_film_tune="-tune animation"
; video_film_tune="-tune film"
verbose="-hide_banner -loglevel warning"
frame_format="png"
audio_format="wav"

[dimensions]
width_initial=720
height_initial=576
width_upscale=1440
height_upscale=1152
width_final=1440
height_final=1080

[commands]
# Extract original part
extract=false

debug=false
flush_cache=false
extract_only=true
; Au revoir... A bientôt...


[filters]
deinterlace_ffmpeg="""
    nnedi=weights=nnedi3_weights.bin:
    nsize=s8x6:
    nns=n128:
    qual=slow:
    etype=s:
    pscrn=new,
    fps=fps=25"""
id_deinterlace=1


[layers]
fgd=k
bgd=a