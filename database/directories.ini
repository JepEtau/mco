[directories]
; Chemins en relatif ou absolu (attention au backslash sous windows!)
inputs="inputs"
cache="N:\cache"
cache_progressive="cache/progressive"
frames="frames"
hashes="hashes"
output="mkv/1080p"
mkvmerge_win="C:\Program Files\MKVToolNix"

3rd_party="../mco_3rd_party"

; https://ffmpeg.org/download.html
ffmpeg="ffmpeg-5.1"
ffmpeg_win="ffmpeg-5.1\bin"


; https://github.com/bilibili/ailab/tree/main/Real-CUGAN
real_cugan = "ailab/Real-CUGAN"
; https://github.com/xinntao/Real-ESRGAN
real_esrgan = "Real-ESRGAN"
; https://github.com/JoeyBallentine/ESRGAN
esrgan = "ESRGAN"


; https://github.com/dubhater/vapoursynth-nnedi3/tree/master/src
nnedi3_weights="nnedi3_weights.bin"


; https://github.com/nihui/realcugan-ncnn-vulkan
; https://github.com/nihui/realcugan-ncnn-vulkan/releases
; realcugan_ncnn_vulkan="realcugan-ncnn-vulkan"

; https://github.com/xinntao/Real-ESRGAN
; realesrgan_ncnn_vulkan="realesrgan-ncnn-vulkan"


; default directories, do not modify this
cache_default="cache"
